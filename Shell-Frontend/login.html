<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — Android Shell Protector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' } },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-600 text-3xl mb-4 shadow-lg shadow-brand-600/30">&#x1F6E1;</div>
      <h1 class="text-white text-xl font-bold">Android Shell Protector</h1>
      <p class="text-slate-500 text-sm mt-1">管理后台登录</p>
    </div>

    <div id="login-card" class="bg-slate-800/50 backdrop-blur border border-slate-700/40 rounded-2xl shadow-2xl p-8">
      <form id="login-form" autocomplete="off">
        <div class="space-y-4">
          <div>
            <label class="block text-slate-400 text-xs font-medium mb-1.5">用户名</label>
            <input id="inp-user" type="text" required autofocus
                   class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white text-sm
                          placeholder:text-slate-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500/30 transition-all"
                   placeholder="请输入用户名">
          </div>
          <div>
            <label class="block text-slate-400 text-xs font-medium mb-1.5">密码</label>
            <input id="inp-pass" type="password" required
                   class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white text-sm
                          placeholder:text-slate-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500/30 transition-all"
                   placeholder="请输入密码">
          </div>
        </div>

        <p id="login-error" class="text-red-400 text-xs mt-3 hidden"></p>

        <button id="btn-login" type="submit"
                class="w-full mt-6 bg-brand-600 hover:bg-brand-500 text-white font-medium py-2.5 rounded-xl
                       transition-colors shadow-lg shadow-brand-600/20 flex items-center justify-center gap-2">
          <span id="btn-text">登 录</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
          </svg>
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">Android Shell Protector v2.0</p>
  </div>

<script>
(function() {
  var form = document.getElementById('login-form');
  var errEl = document.getElementById('login-error');
  var card = document.getElementById('login-card');
  var btnText = document.getElementById('btn-text');
  var btnSpinner = document.getElementById('btn-spinner');
  var btn = document.getElementById('btn-login');

  if (localStorage.getItem('token')) {
    window.location.href = '/';
    return;
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errEl.classList.add('hidden');
    btn.disabled = true;
    btnText.textContent = '登录中...';
    btnSpinner.classList.remove('hidden');

    try {
      var res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('inp-user').value.trim(),
          password: document.getElementById('inp-pass').value,
        }),
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.detail || '登录失败');
      localStorage.setItem('token', data.token);
      window.location.href = '/';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      card.classList.add('shake');
      setTimeout(function(){ card.classList.remove('shake'); }, 500);
    } finally {
      btn.disabled = false;
      btnText.textContent = '登 录';
      btnSpinner.classList.add('hidden');
    }
  });
})();
</script>
</body>
</html>
